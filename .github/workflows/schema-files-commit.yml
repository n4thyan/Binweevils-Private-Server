name: Commit Schema Files

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to receive generated schema files"
        required: true
        default: "database/schema-files"
      commit_message:
        description: "Commit message for generated schema files"
        required: true
        default: "database: add generated schema files [skip ci]"

permissions:
  contents: write

jobs:
  commit-schema-files:
    name: Commit generated schema files
    runs-on: ubuntu-latest

    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate schema files
        run: python tools/extract_schema_from_dump.py --input bwps.sql --output-dir database/schema

      - name: Show generated manifest
        run: cat database/schema/schema_manifest.md

      - name: Verify generated files exist
        run: |
          test -s database/schema/001_base_schema.sql
          test -s database/schema/002_keys_auto_increment.sql
          test -s database/schema/schema_manifest.md

      - name: Commit generated schema files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add database/schema/001_base_schema.sql database/schema/002_keys_auto_increment.sql database/schema/schema_manifest.md
          if git diff --cached --quiet; then
            echo "No schema changes to commit."
          else
            git commit -m "${{ inputs.commit_message }}"
            git push origin HEAD:${{ inputs.target_branch }}
          fi
