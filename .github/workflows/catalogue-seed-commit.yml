name: Commit Catalogue Seed

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to receive generated catalogue seed SQL"
        required: true
        default: "database/catalogue-reference-seed"
      commit_message:
        description: "Commit message for generated catalogue seed SQL"
        required: true
        default: "database: add catalogue reference seed [skip ci]"

permissions:
  contents: write

jobs:
  commit-catalogue-seed:
    name: Commit generated catalogue seed SQL
    runs-on: ubuntu-latest

    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Syntax-check seed extractor
        run: python -m py_compile tools/extract_seed_tables.py

      - name: Generate catalogue reference seed SQL
        run: >-
          python tools/extract_seed_tables.py
          --input bwps.sql
          --output database/seeds/001_catalogue_reference.sql
          --manifest database/seeds/seed_manifest.md
          --table itemtype,itemtypets,appareltypes,gardenitemtype,seeds,puzzletypes,crosswords,questtasks

      - name: Verify generated catalogue seed exists
        run: test -s database/seeds/001_catalogue_reference.sql

      - name: Refuse obvious blocked-table inserts
        run: |
          ! grep -E "INSERT INTO \`(users|buddyalerts|buddylist|nest|nestinfo|weevilitems|weevilhats|gardeninventory|game-logs|game-rewards|redeemedcodes)\`" database/seeds/001_catalogue_reference.sql

      - name: Show generated manifest
        run: cat database/seeds/seed_manifest.md

      - name: Commit generated catalogue seed SQL
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add database/seeds/001_catalogue_reference.sql database/seeds/seed_manifest.md
          if git diff --cached --quiet; then
            echo "No catalogue seed changes to commit."
          else
            git commit -m "${{ inputs.commit_message }}"
            git push origin HEAD:${{ inputs.target_branch }}
          fi
